server {
    listen 80;
    listen [::]:80;
    server_name veddi.com.br www.veddi.com.br;

    # Redirecionar HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name veddi.com.br www.veddi.com.br;

    root /var/www/veddi-landing;
    index index.html;

    # Certificados SSL (gerados via certbot)
    ssl_certificate     /etc/letsencrypt/live/veddi.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veddi.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Servir arquivos estáticos
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache para assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
